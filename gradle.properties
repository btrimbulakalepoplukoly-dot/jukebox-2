# ==== Версії для Minecraft 26.2 "Chaos Cubed" ====
# Ці значення актуальні станом на кінець червня 2026.
# Якщо gradle видасть помилку "could not resolve" — піди на
# https://fabricmc.net/develop/template/ обери Minecraft 26.2,
# згенеруй проєкт і просто скопіюй звідти актуальні рядки нижче
# (mappings/loader дуже часто оновлюються).

minecraft_version=26.2
yarn_mappings=26.2+build.1
loader_version=0.19.3

# Fabric API
fabric_version=0.153.0+26.2

# Mod properties
mod_version=1.0.0
maven_group=net.chaosjukebox
archives_base_name=chaosjukebox

# Gradle
org.gradle.jvmargs=-Xmx2G
org.gradle.parallel=true
